<script>
const SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSvBmAD_4xlHEPjhYZ4vphGrmLXOkASsPhU4E1MRV9O8vpjRILdR9kzK9FKpnIobBMJnz6UA1oKrAhk/pub?gid=0&single=true&output=csv';
const SAMPLE_DATA=[
  {citizen_name:"Ramesh Kumar Gupta",contact_number:"9452238364",mohalla:"Andheri Bagh",location_description:"Gali no. 3 ke paas, pump ke saamne",problem_type:"NAALI",problem_description:"PRIORITY: Naali puri tarah band hai, baarish mein paani ghar mein ghusta hai.",duration:"4 mahine",timestamp:"2026-05-20 10:32:00",ward_number:"1",latitude:"27.374258",longitude:"79.619442"},
  {citizen_name:"Sunita Devi",contact_number:"8527749354",mohalla:"Badargang",location_description:"Main road se Radha Shyam ke ghar tak",problem_type:"SADAK",problem_description:"PRIORITY: Poori sadak tooti hui hai. Baarish mein ghutne tak paani bharta hai.",duration:"2 saal",timestamp:"2026-05-20 11:15:00",ward_number:"31",latitude:"27.381245",longitude:"79.598732"}
  // ... (keep the rest of your sample data here) ...
];
const TYPE_CONFIG={'NAALI':{color:'#60a5fa',emoji:'🌊',label:'Naali / Drain'},'SADAK':{color:'#f97316',emoji:'🛣️',label:'Sadak / Road'},'GANDAGI':{color:'#a78bfa',emoji:'🗑️',label:'Gandagi / Kachra'},'PAANI':{color:'#22d3ee',emoji:'💧',label:'Paani / Water'},'STREET_LIGHT':{color:'#fbbf24',emoji:'💡',label:'Street Light'},'CERTIFICATE':{color:'#f472b6',emoji:'📄',label:'Certificate'},'OTHER':{color:'#94a3b8',emoji:'📋',label:'Other'}};

let allData=[],markers=[],activeFilter='ALL',map;

function initMap(){
  map=L.map('map',{center:[27.374,79.607],zoom:13});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map)
}

function createMarkerIcon(type,desc){
  const c=TYPE_CONFIG[type]||TYPE_CONFIG['OTHER'];
  const isU=desc&&desc.includes('URGENT EMERGENCY');
  const isP=desc&&desc.includes('PRIORITY:');
  const bc=isU?'#ef4444':isP?'#fb923c':c.color;
  const sz=isU?36:isP?32:28;
  return L.divIcon({
    html:`<div style="width:${sz}px;height:${sz}px;background:${c.color}22;border:2px solid ${bc};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px ${c.color}44;${isU?'animation:urgentPulse 1s infinite;':''}"><span style="transform:rotate(45deg);font-size:${sz*.45}px">${c.emoji}</span></div>`,
    className:'',
    iconSize:[sz,sz],
    iconAnchor:[sz/2,sz],
    popupAnchor:[0,-sz]
  })
}

function buildPopup(d){
  const c=TYPE_CONFIG[d.problem_type]||TYPE_CONFIG['OTHER'];
  const isU=d.problem_description&&d.problem_description.includes('URGENT EMERGENCY');
  const isP=d.problem_description&&d.problem_description.includes('PRIORITY:');
  const tag=isU?`<div class="urgency-tag urgency-urgent">🚨 URGENT EMERGENCY</div>`:isP?`<div class="urgency-tag urgency-priority">⚠ PRIORITY</div>`:'';
  const desc=(d.problem_description||'').replace('URGENT EMERGENCY: ','').replace('PRIORITY: ','');
  const ts=d.timestamp?new Date(d.timestamp).toLocaleDateString('hi-IN',{day:'numeric',month:'short',year:'numeric'}):'Unknown';
  return`<div><div class="popup-header"><div class="popup-type-dot" style="background:${c.color}"></div><div class="popup-name">${d.citizen_name||'Anonymous'}</div></div><div class="popup-body">${tag}<div class="popup-row"><div class="popup-label">MOHALLA</div><div class="popup-value">${d.mohalla||'—'}, Ward ${d.ward_number||'?'}</div></div><div class="popup-row"><div class="popup-label">SAMASYA</div><div class="popup-value" style="color:${c.color}">${c.label}</div></div><div class="popup-row"><div class="popup-label">DETAIL</div><div class="popup-value" style="font-size:11px;line-height:1.6">${desc}</div></div><div class="popup-row"><div class="popup-label">DURATION</div><div class="popup-value">${d.duration||'—'}</div></div><div class="popup-row"><div class="popup-label">DATE</div><div class="popup-value">${ts}</div></div><div class="popup-row"><div class="popup-label">LOCATION</div><div class="popup-value" style="font-size:11px">${d.location_description||'—'}</div></div></div></div>`
}

function renderMarkers(data){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  (activeFilter==='ALL'?data:data.filter(d=>d.problem_type===activeFilter)).forEach(d=>{
    const lat=parseFloat(d.latitude),lon=parseFloat(d.longitude);
    if(isNaN(lat)||isNaN(lon))return;
    const m=L.marker([lat,lon],{icon:createMarkerIcon(d.problem_type,d.problem_description)});
    m.bindPopup(buildPopup(d),{className:'custom-popup',maxWidth:300});
    m.addTo(map);
    markers.push(m)
  })
}

function renderSidebar(data){
  const urgent=data.filter(d=>d.problem_description&&d.problem_description.includes('URGENT EMERGENCY')).length;
  const priority=data.filter(d=>d.problem_description&&d.problem_description.includes('PRIORITY:')).length;
  document.getElementById('total-count').textContent=data.length;
  document.getElementById('ward-count').textContent=new Set(data.map(d=>d.ward_number)).size;
  document.getElementById('urgent-count').textContent=urgent;
  document.getElementById('priority-count').textContent=priority;
  
  const tc={};
  data.forEach(d=>{tc[d.problem_type]=(tc[d.problem_type]||0)+1});
  
  const fl=document.getElementById('filter-list');
  fl.innerHTML='';
  
  const ab=document.createElement('button');
  ab.className='filter-btn'+(activeFilter==='ALL'?' active':'');
  ab.innerHTML=`<div class="filter-dot" style="background:#4ade80"></div><span>All Types</span><span class="filter-count">${data.length}</span>`;
  ab.onclick=()=>{activeFilter='ALL';renderAll()};
  fl.appendChild(ab);
  
  Object.entries(TYPE_CONFIG).forEach(([type,c])=>{
    const cnt=tc[type]||0;
    if(!cnt)return;
    const btn=document.createElement('button');
    btn.className='filter-btn'+(activeFilter===type?' active':'');
    btn.innerHTML=`<div class="filter-dot" style="background:${c.color}"></div><span>${c.label}</span><span class="filter-count">${cnt}</span>`;
    btn.onclick=()=>{activeFilter=type;renderAll()};
    fl.appendChild(btn)
  });
  
  const sorted=[...data].sort((a,b)=>{
    const ua=a.problem_description&&a.problem_description.includes('URGENT')?2:a.problem_description&&a.problem_description.includes('PRIORITY')?1:0;
    const ub=b.problem_description&&b.problem_description.includes('URGENT')?2:b.problem_description&&b.problem_description.includes('PRIORITY')?1:0;
    return ub-ua
  });
  
  const list=document.getElementById('complaint-list');
  list.innerHTML='';
  sorted.forEach(d=>{
    const c=TYPE_CONFIG[d.problem_type]||TYPE_CONFIG['OTHER'];
    const isU=d.problem_description&&d.problem_description.includes('URGENT EMERGENCY');
    const isP=d.problem_description&&d.problem_description.includes('PRIORITY:');
    const bc=isU?'#ef4444':isP?'#fb923c':c.color;
    const bt=isU?'URGENT':isP?'PRIORITY':d.problem_type.replace('_',' ');
    const item=document.createElement('div');
    item.className='complaint-item';
    item.innerHTML=`<div class="complaint-item-header"><div class="complaint-name">${d.citizen_name||'Anonymous'}</div><div class="complaint-type-badge" style="background:${bc}22;border:1px solid ${bc};color:${bc}">${bt}</div></div><div class="complaint-mohalla">${c.emoji} ${d.mohalla||'—'}, Ward ${d.ward_number||'?'}</div><div class="complaint-meta">${d.duration||'—'}</div>`;
    item.onclick=()=>{
      const lat=parseFloat(d.latitude),lon=parseFloat(d.longitude);
      if(!isNaN(lat)&&!isNaN(lon)){
        map.flyTo([lat,lon],16,{duration:1.2});
        setTimeout(()=>{
          const mk=markers.find(m=>{
            const ll=m.getLatLng();
            return Math.abs(ll.lat-lat)<.0001&&Math.abs(ll.lng-lon)<.0001
          });
          if(mk)mk.openPopup()
        },1300)
      }
    };
    list.appendChild(item)
  })
}

function renderAll(){
  renderMarkers(allData);
  renderSidebar(allData)
}

async function loadData(){
  try{
    // Fix 1: Append a timestamp to bypass browser cache
    const cacheBuster = new Date().getTime();
    const url = `${SHEET_CSV_URL}&t=${cacheBuster}`;
    
    // Fix 2: Force no-store caching strategy
    const res = await fetch(url, { cache: 'no-store' });
    
    // Fix 3: Explicitly check for HTTP errors (like 404 if not published)
    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
    
    const text = await res.text();
    const parsed = parseCSV(text);
    
    // Only use new data if it actually parsed rows successfully
    allData = parsed.length > 0 ? parsed : SAMPLE_DATA;
    
  } catch(e) {
    console.error('Data pull failed, falling back to sample data:', e);
    allData = SAMPLE_DATA;
  }
  renderAll()
}

function parseCSV(text){
  // Fix 4: Strip Windows carriage returns (\r) before processing
  const cleanText = text.replace(/\r/g, '').trim();
  if(!cleanText) return [];
  
  const lines = cleanText.split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  
  return lines.slice(1).map(line => {
    // Fix 5: Robust CSV splitting that handles commas inside quotes AND empty fields
    const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const obj = {};
    headers.forEach((h, i) => {
      // Safely assign values, stripping surrounding quotes
      obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim();
    });
    return obj;
  }).filter(d => d.latitude && d.longitude); // Ensure map coordinates exist
}

initMap();
loadData();
// Pull fresh data every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
